name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Ensure a Rust toolchain is on PATH
        run: |
          # This self-hosted runner is isolated: CARGO_HOME/RUSTUP_HOME
          # point to a private per-runner Rust home so a neighbouring
          # repo sharing the runner user can never clobber this
          # toolchain; both fall back to the user default when unset.
          # Prefer the rustup proxy when intact (it honors
          # rust-toolchain.toml and can install new channels); otherwise
          # fall back to the installed toolchain's real binaries, which
          # survive the proxy binary going missing.
          cargo_home="${CARGO_HOME:-$HOME/.cargo}"
          rustup_home="${RUSTUP_HOME:-$HOME/.rustup}"
          echo "ISO-CHECK cargo_home=$cargo_home rustup_home=$rustup_home"
          if [ -x "$cargo_home/bin/rustup" ] && [ -x "$cargo_home/bin/cargo" ]; then
            echo "$cargo_home/bin" >> "$GITHUB_PATH"
            exit 0
          fi
          channel="$(sed -n 's/^[[:space:]]*channel[[:space:]]*=[[:space:]]*"\(.*\)".*/\1/p' rust-toolchain.toml 2>/dev/null)"
          for tc in "$rustup_home/toolchains/${channel}-"* "$rustup_home/toolchains/"*; do
            if [ -x "$tc/bin/cargo" ]; then
              echo "$tc/bin" >> "$GITHUB_PATH"
              exit 0
            fi
          done
          echo "::error::No usable Rust toolchain: no rustup proxy and no toolchains/*/bin/cargo under $cargo_home or $rustup_home." >&2
          exit 1

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

  test:
    name: Test
    runs-on: self-hosted
    concurrency:
      group: ci-test-self-hosted
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Ensure a Rust toolchain is on PATH
        run: |
          # This self-hosted runner is isolated: CARGO_HOME/RUSTUP_HOME
          # point to a private per-runner Rust home so a neighbouring
          # repo sharing the runner user can never clobber this
          # toolchain; both fall back to the user default when unset.
          # Prefer the rustup proxy when intact (it honors
          # rust-toolchain.toml and can install new channels); otherwise
          # fall back to the installed toolchain's real binaries, which
          # survive the proxy binary going missing.
          cargo_home="${CARGO_HOME:-$HOME/.cargo}"
          rustup_home="${RUSTUP_HOME:-$HOME/.rustup}"
          echo "ISO-CHECK cargo_home=$cargo_home rustup_home=$rustup_home"
          if [ -x "$cargo_home/bin/rustup" ] && [ -x "$cargo_home/bin/cargo" ]; then
            echo "$cargo_home/bin" >> "$GITHUB_PATH"
            exit 0
          fi
          channel="$(sed -n 's/^[[:space:]]*channel[[:space:]]*=[[:space:]]*"\(.*\)".*/\1/p' rust-toolchain.toml 2>/dev/null)"
          for tc in "$rustup_home/toolchains/${channel}-"* "$rustup_home/toolchains/"*; do
            if [ -x "$tc/bin/cargo" ]; then
              echo "$tc/bin" >> "$GITHUB_PATH"
              exit 0
            fi
          done
          echo "::error::No usable Rust toolchain: no rustup proxy and no toolchains/*/bin/cargo under $cargo_home or $rustup_home." >&2
          exit 1

      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo test --workspace

      - name: Doctests
        run: cargo test --doc --workspace

      - name: Integration tests
        run: bash test/run_tests.sh
