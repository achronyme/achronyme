name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: self-hosted
    steps:
      - name: Ensure the rustup toolchain is on PATH
        run: |
          # The rustup proxies live in ~/.cargo/bin, but that directory
          # is dropped from the job PATH after a runner-service restart,
          # and a wrapper earlier on PATH shadows `cargo` and exits
          # non-zero. Put the rustup shims first so cargo resolves to the
          # real toolchain (the pinned channel in rust-toolchain.toml is
          # selected once the repo is checked out).
          if [ -x "$HOME/.cargo/bin/cargo" ]; then
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          elif ! command -v cargo >/dev/null 2>&1; then
            echo "::error::cargo not found on this self-hosted runner: no ~/.cargo/bin/cargo and none on PATH. Install rustup for the runner user." >&2
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

  test:
    name: Test
    runs-on: self-hosted
    concurrency:
      group: ci-test-self-hosted
      cancel-in-progress: false
    steps:
      - name: Ensure the rustup toolchain is on PATH
        run: |
          # The rustup proxies live in ~/.cargo/bin, but that directory
          # is dropped from the job PATH after a runner-service restart,
          # and a wrapper earlier on PATH shadows `cargo` and exits
          # non-zero. Put the rustup shims first so cargo resolves to the
          # real toolchain (the pinned channel in rust-toolchain.toml is
          # selected once the repo is checked out).
          if [ -x "$HOME/.cargo/bin/cargo" ]; then
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          elif ! command -v cargo >/dev/null 2>&1; then
            echo "::error::cargo not found on this self-hosted runner: no ~/.cargo/bin/cargo and none on PATH. Install rustup for the runner user." >&2
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo test --workspace

      - name: Doctests
        run: cargo test --doc --workspace

      - name: Integration tests
        run: bash test/run_tests.sh
