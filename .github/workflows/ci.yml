name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: self-hosted
    steps:
      - name: Ensure a working cargo is on PATH
        run: |
          # A wrapper or stale shim can answer `command -v cargo` yet
          # fail to exec the real toolchain, so require cargo to actually
          # run; fall back to the rustup install dirs, putting a working
          # one ahead of any broken wrapper for subsequent steps.
          if cargo --version >/dev/null 2>&1; then
            exit 0
          fi
          for d in "$HOME/.cargo/bin" /opt/cargo/bin /usr/local/cargo/bin; do
            if [ -x "$d/cargo" ] && "$d/cargo" --version >/dev/null 2>&1; then
              echo "$d" >> "$GITHUB_PATH"
              exit 0
            fi
          done
          echo "::error::No working cargo on this self-hosted runner (a cargo on PATH may resolve but fail to run)."
          echo "whoami=$(whoami) HOME=$HOME"
          echo "resolved cargo: $(command -v cargo || echo none)"
          ls -la "$(command -v cargo)" 2>/dev/null || true
          echo "PATH=$PATH"
          for d in "$HOME/.cargo/bin" /opt/cargo/bin /usr/local/cargo/bin /usr/local/bin; do
            echo "## $d"
            ls -la "$d" 2>&1 | grep -E 'cargo|rustc|rustup' || echo "  (no rust shims)"
          done
          exit 1

      - uses: actions/checkout@v4

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

  test:
    name: Test
    runs-on: self-hosted
    concurrency:
      group: ci-test-self-hosted
      cancel-in-progress: false
    steps:
      - name: Ensure a working cargo is on PATH
        run: |
          # A wrapper or stale shim can answer `command -v cargo` yet
          # fail to exec the real toolchain, so require cargo to actually
          # run; fall back to the rustup install dirs, putting a working
          # one ahead of any broken wrapper for subsequent steps.
          if cargo --version >/dev/null 2>&1; then
            exit 0
          fi
          for d in "$HOME/.cargo/bin" /opt/cargo/bin /usr/local/cargo/bin; do
            if [ -x "$d/cargo" ] && "$d/cargo" --version >/dev/null 2>&1; then
              echo "$d" >> "$GITHUB_PATH"
              exit 0
            fi
          done
          echo "::error::No working cargo on this self-hosted runner (a cargo on PATH may resolve but fail to run)."
          echo "whoami=$(whoami) HOME=$HOME"
          echo "resolved cargo: $(command -v cargo || echo none)"
          ls -la "$(command -v cargo)" 2>/dev/null || true
          echo "PATH=$PATH"
          for d in "$HOME/.cargo/bin" /opt/cargo/bin /usr/local/cargo/bin /usr/local/bin; do
            echo "## $d"
            ls -la "$d" 2>&1 | grep -E 'cargo|rustc|rustup' || echo "  (no rust shims)"
          done
          exit 1

      - uses: actions/checkout@v4

      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo test --workspace

      - name: Doctests
        run: cargo test --doc --workspace

      - name: Integration tests
        run: bash test/run_tests.sh
