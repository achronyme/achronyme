name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Ensure a Rust toolchain is on PATH
        run: |
          # CI must survive the runner's recurring loss of the rustup
          # proxy binary (~/.cargo/bin/rustup), which dangles all the
          # cargo/rustc symlinks and lets a wrapper earlier on PATH fail
          # with exit 127. Prefer the rustup proxy when it is intact (it
          # honors rust-toolchain.toml and can install new channels);
          # otherwise fall back to the installed toolchain's real
          # binaries, which survive the proxy going missing.
          if [ -x "$HOME/.cargo/bin/rustup" ] && [ -x "$HOME/.cargo/bin/cargo" ]; then
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
            exit 0
          fi
          channel="$(sed -n 's/^[[:space:]]*channel[[:space:]]*=[[:space:]]*"\(.*\)".*/\1/p' rust-toolchain.toml 2>/dev/null)"
          for tc in "$HOME/.rustup/toolchains/${channel}-"* "$HOME/.rustup/toolchains/"*; do
            if [ -x "$tc/bin/cargo" ]; then
              echo "$tc/bin" >> "$GITHUB_PATH"
              exit 0
            fi
          done
          echo "::error::No usable Rust toolchain on this self-hosted runner: rustup proxy missing and no ~/.rustup/toolchains/*/bin/cargo. Reinstall rustup for the runner user." >&2
          exit 1

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

  test:
    name: Test
    runs-on: self-hosted
    concurrency:
      group: ci-test-self-hosted
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Ensure a Rust toolchain is on PATH
        run: |
          # CI must survive the runner's recurring loss of the rustup
          # proxy binary (~/.cargo/bin/rustup), which dangles all the
          # cargo/rustc symlinks and lets a wrapper earlier on PATH fail
          # with exit 127. Prefer the rustup proxy when it is intact (it
          # honors rust-toolchain.toml and can install new channels);
          # otherwise fall back to the installed toolchain's real
          # binaries, which survive the proxy going missing.
          if [ -x "$HOME/.cargo/bin/rustup" ] && [ -x "$HOME/.cargo/bin/cargo" ]; then
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
            exit 0
          fi
          channel="$(sed -n 's/^[[:space:]]*channel[[:space:]]*=[[:space:]]*"\(.*\)".*/\1/p' rust-toolchain.toml 2>/dev/null)"
          for tc in "$HOME/.rustup/toolchains/${channel}-"* "$HOME/.rustup/toolchains/"*; do
            if [ -x "$tc/bin/cargo" ]; then
              echo "$tc/bin" >> "$GITHUB_PATH"
              exit 0
            fi
          done
          echo "::error::No usable Rust toolchain on this self-hosted runner: rustup proxy missing and no ~/.rustup/toolchains/*/bin/cargo. Reinstall rustup for the runner user." >&2
          exit 1

      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo test --workspace

      - name: Doctests
        run: cargo test --doc --workspace

      - name: Integration tests
        run: bash test/run_tests.sh
