name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: self-hosted
    steps:
      - name: Ensure Rust toolchain on PATH
        run: |
          if command -v cargo >/dev/null 2>&1; then
            exit 0
          fi
          for d in "$HOME/.cargo/bin" /opt/cargo/bin /usr/local/cargo/bin; do
            if [ -x "$d/cargo" ]; then
              echo "$d" >> "$GITHUB_PATH"
              exit 0
            fi
          done
          echo "::error::cargo not found on this self-hosted runner (checked PATH, \$HOME/.cargo/bin, /opt/cargo/bin, /usr/local/cargo/bin). Install rustup for the runner user, or symlink the cargo shims into /usr/local/bin." >&2
          exit 1

      - uses: actions/checkout@v4

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

  test:
    name: Test
    runs-on: self-hosted
    concurrency:
      group: ci-test-self-hosted
      cancel-in-progress: false
    steps:
      - name: Ensure Rust toolchain on PATH
        run: |
          if command -v cargo >/dev/null 2>&1; then
            exit 0
          fi
          for d in "$HOME/.cargo/bin" /opt/cargo/bin /usr/local/cargo/bin; do
            if [ -x "$d/cargo" ]; then
              echo "$d" >> "$GITHUB_PATH"
              exit 0
            fi
          done
          echo "::error::cargo not found on this self-hosted runner (checked PATH, \$HOME/.cargo/bin, /opt/cargo/bin, /usr/local/cargo/bin). Install rustup for the runner user, or symlink the cargo shims into /usr/local/bin." >&2
          exit 1

      - uses: actions/checkout@v4

      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo test --workspace

      - name: Doctests
        run: cargo test --doc --workspace

      - name: Integration tests
        run: bash test/run_tests.sh
