name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: achronyme-linux-x86_64
            pgo: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: achronyme-linux-aarch64
            pgo: false
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: achronyme-macos-x86_64
            pgo: false
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: achronyme-macos-aarch64
            pgo: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: achronyme-windows-x86_64.exe
            pgo: true

    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: llvm-tools

      - name: Build with PGO
        if: matrix.pgo
        shell: bash
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: |
          set -euo pipefail
          SYSROOT="$(rustc --print sysroot)"
          LLVM_PROFDATA="$(find "$SYSROOT" -name 'llvm-profdata*' | head -1)"
          if [[ -z "$LLVM_PROFDATA" ]]; then
            echo "::error::llvm-profdata not found in $SYSROOT"
            exit 1
          fi
          PGO_DIR="$PWD/target/pgo-data"
          TARGET="${{ matrix.target }}"
          BIN="target/$TARGET/release/ach"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            BIN="target/$TARGET/release/ach.exe"
          fi

          # Step 1: Instrumented build
          echo "::group::PGO Step 1/3: Instrumented build"
          mkdir -p "$PGO_DIR"
          RUSTFLAGS="-Cprofile-generate=$PGO_DIR" \
            cargo build -p cli --release --target "$TARGET"
          echo "::endgroup::"

          # Step 2: Collect profile data
          echo "::group::PGO Step 2/3: Collecting profiles"
          echo 'mut counter = 0; forever { counter = counter + 1; if counter > 10000000 { break } }' > /tmp/_pgo_bench.ach
          for _ in 1 2 3; do "$BIN" run /tmp/_pgo_bench.ach >/dev/null 2>&1 || true; done
          rm -f /tmp/_pgo_bench.ach

          for f in test/vm/operators/*.ach \
                   test/vm/control_flow/*.ach \
                   test/vm/functions/*.ach \
                   test/vm/collections/*.ach \
                   test/vm/data_types/*.ach \
                   test/vm/integration/*.ach \
                   test/vm/variables/*.ach \
                   test/vm/edgecases/*.ach; do
            "$BIN" run "$f" >/dev/null 2>&1 || true
          done
          echo "  Profiles: $(find "$PGO_DIR" -name '*.profraw' | wc -l)"
          echo "::endgroup::"

          # Step 3: PGO-optimized rebuild
          echo "::group::PGO Step 3/3: Optimized rebuild"
          find "$PGO_DIR" -name '*.profraw' | xargs "$LLVM_PROFDATA" merge -o "$PGO_DIR/merged.profdata"
          RUSTFLAGS="-Cprofile-use=$PGO_DIR/merged.profdata -Cllvm-args=-pgo-warn-missing-function=false" \
            cargo build -p cli --release --target "$TARGET"
          echo "::endgroup::"

      - name: Build without PGO
        if: "!matrix.pgo"
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build -p cli --release --target ${{ matrix.target }}

      - name: Rename binary (unix)
        if: runner.os != 'Windows'
        run: |
          mv target/${{ matrix.target }}/release/ach ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: Rename binary (windows)
        if: runner.os == 'Windows'
        run: mv target/${{ matrix.target }}/release/ach.exe ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
